<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate PWA Icons</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f0f0f0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        .icon-preview {
            display: inline-block;
            margin: 10px;
            text-align: center;
        }
        canvas {
            border: 1px solid #ccc;
            display: block;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #2563eb;
        }
        #file-input {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Smartslate Polaris PWA Icon Generator</h1>
        <p>Upload your logo image to generate all required PWA icons</p>

        <input type="file" id="file-input" accept="image/*" />
        <button onclick="generateIcons()">Generate Icons</button>

        <div id="icons-container"></div>
    </div>

    <script>
        const iconSizes = [72, 96, 128, 144, 152, 192, 384, 512];

        function generateIcons() {
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];

            if (!file) {
                // Use existing logo.png if no file selected
                const img = new Image();
                img.onload = () => createIcons(img);
                img.src = '/logo.png';
            } else {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => createIcons(img);
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function createIcons(img) {
            const container = document.getElementById('icons-container');
            container.innerHTML = '<h2>Generated Icons (Right-click to save)</h2>';

            iconSizes.forEach(size => {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');

                // Fill background (for maskable icons)
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, size, size);

                // Calculate padding for maskable safe area (10% padding)
                const padding = size * 0.1;
                const drawSize = size - (padding * 2);

                // Draw image centered with padding
                ctx.drawImage(img, padding, padding, drawSize, drawSize);

                const wrapper = document.createElement('div');
                wrapper.className = 'icon-preview';
                wrapper.appendChild(canvas);

                const label = document.createElement('div');
                label.textContent = `icon-${size}x${size}.png`;
                wrapper.appendChild(label);

                const downloadBtn = document.createElement('button');
                downloadBtn.textContent = 'Download';
                downloadBtn.onclick = () => {
                    canvas.toBlob(blob => {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `icon-${size}x${size}.png`;
                        a.click();
                        URL.revokeObjectURL(url);
                    });
                };
                wrapper.appendChild(downloadBtn);

                container.appendChild(wrapper);
            });
        }

        // Auto-generate on page load using existing logo
        window.onload = () => generateIcons();
    </script>
</body>
</html>
